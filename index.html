<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентация: Силикатная промышленность | Химия</title>
    <!-- Подключаем шрифты для современного вида -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (бесплатные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #1e2b3c 0%, #0f1a26 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #e9f1f7;
        }

        /* основной контейнер презентации */
        .presentation-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 30px 25px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* навигация по слайдам (индикаторы и стрелки) */
        .slide-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .nav-arrow {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }

        .nav-arrow:hover {
            background: rgba(70, 130, 200, 0.5);
            border-color: #4a9eff;
            transform: scale(1.05);
        }

        .nav-arrow:active { transform: scale(0.98); }

        .slide-dots {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 30px;
            background: rgba(200,220,255,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        .dot.active {
            background: #6ab0ff;
            width: 40px;
            box-shadow: 0 0 12px #3f8eff;
            border-color: white;
        }

        /* область слайда */
        .slide-area {
            background: rgba(15, 25, 35, 0.7);
            border-radius: 36px;
            padding: 35px 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 15px 25px rgba(0,0,0,0.6);
            min-height: 500px;
            display: flex;
            align-items: center;
            transition: opacity 0.3s ease;
        }

        .slide-content {
            width: 100%;
        }

        /* типографика */
        h1, h2, h3 {
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 4rem;
            background: linear-gradient(to right, #f0e68c, #b0d0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        h2 {
            font-size: 2.4rem;
            color: #c7e0ff;
            border-left: 7px solid #5f9eff;
            padding-left: 20px;
            margin-bottom: 25px;
        }

        h3 {
            font-size: 1.8rem;
            color: #c0d8f0;
            margin-bottom: 20px;
        }

        .subhead {
            color: #a0bbd9;
            font-size: 1.3rem;
            font-weight: 500;
        }

        /* карточки, списки, сетки */
        .grid-2, .grid-3 {
            display: grid;
            gap: 25px;
            margin: 30px 0;
        }

        .grid-2 { grid-template-columns: repeat(2,1fr); }
        .grid-3 { grid-template-columns: repeat(3,1fr); }

        .glass-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 25px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        .glass-card:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.25);
        }

        .icon-large {
            font-size: 2.8rem;
            color: #7cb3ff;
            margin-bottom: 15px;
        }

        ul, ol {
            padding-left: 25px;
            font-size: 1.2rem;
            line-height: 1.7;
            color: #d2e3ff;
        }

        li {
            margin: 12px 0;
        }

        .badge {
            background: #2f4b70;
            padding: 6px 15px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 12px;
            color: white;
            letter-spacing: 0.3px;
        }

        .formula {
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.4);
            padding: 6px 15px;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid #4f7eb3;
            color: #ffecaa;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0,0,0,0.25);
            border-radius: 20px;
            overflow: hidden;
        }

        th {
            background: #1d3c5e;
            color: white;
            font-weight: 600;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 14px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* для химических реакций */
        .reaction {
            background: #1b334d;
            border-radius: 40px;
            padding: 18px 25px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #e5d5a0;
            text-align: center;
            box-shadow: inset 0 2px 5px #0a121e;
            border: 1px solid #435e80;
            margin: 20px 0;
        }

        /* колонка с цифрами */
        .stat-number {
            font-size: 2.8rem;
            font-weight: 700;
            color: #ffdb8e;
            line-height: 1;
        }

        hr {
            border: 1px solid rgba(255,255,255,0.1);
            margin: 25px 0;
        }

        /* адаптив */
        @media (max-width: 800px) {
            h1 { font-size: 3rem; }
            .slide-area { padding: 25px 20px; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }
        @media (max-width: 500px) {
            .presentation-container { padding: 20px 15px; }
            .slide-dots { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="presentation-container">
    <!-- навигация -->
    <div class="slide-controls">
        <div class="nav-arrow" id="prevSlide"><i class="fas fa-chevron-left"></i></div>
        <div class="slide-dots" id="slideDots">
            <!-- будут сгенерированы JS -->
        </div>
        <div class="nav-arrow" id="nextSlide"><i class="fas fa-chevron-right"></i></div>
    </div>

    <!-- динамическая область слайда -->
    <div class="slide-area" id="slideArea">
        <div class="slide-content" id="slideContent">
            <!-- слайды подставляются через JS -->
        </div>
    </div>

    <!-- дополнительная информация: номер слайда -->
    <div style="text-align: center; margin-top: 25px; color: #8fa9c9; font-weight: 500;">
        <span id="slideCounter">1 / 7</span>
    </div>
</div>

<script>
    (function() {
        // Данные презентации: каждый слайд — объект с title, content (html)
        const slides = [
            { // слайд 1: титульный
                title: 'Силикатная промышленность',
                subtitle: 'Химия вокруг нас: стекло, керамика, цемент',
                icon: 'fa-industry'
            },
            { // слайд 2: определение и сырьё
                title: 'Что это?',
                raw: `
                    <div class="badge"><i class="fas fa-microscope"></i> Определение</div>
                    <p style="font-size:1.5rem; font-weight:500;">Силикатная промышленность — производство материалов на основе <span class="formula">SiO₂</span> и природных силикатов.</p>
                    <div class="grid-2" style="margin-top:35px;">
                        <div class="glass-card"><i class="fas fa-mountain icon-large"></i><h3>Основное сырьё</h3><ul><li>Кварцевый песок (SiO₂)</li><li>Полевые шпаты</li><li>Глина (алюмосиликаты)</li><li>Известняк (CaCO₃)</li><li>Сода (Na₂CO₃)</li></ul></div>
                        <div class="glass-card"><i class="fas fa-flask icon-large"></i><h3>Главная реакция</h3><div class="reaction">Na₂CO₃ + SiO₂ → Na₂SiO₃ + CO₂↑</div><p>Образование силикатов при сплавлении</p></div>
                    </div>
                `
            },
            { // слайд 3: стекло
                title: 'Стекло',
                raw: `
                    <h2><i class="fas fa-wine-glass-empty" style="margin-right:15px;"></i>Стеклоделие</h2>
                    <div class="grid-2">
                        <div><p><strong>Состав оконного стекла:</strong> <span class="formula">Na₂O·CaO·6SiO₂</span></p>
                        <p>Получают сплавлением соды, известняка и песка.</p>
                        <div class="reaction" style="font-size:1.2rem;">Na₂CO₃ + CaCO₃ + 6SiO₂ → Na₂O·CaO·6SiO₂ + 2CO₂</div>
                        </div>
                        <div class="glass-card"><i class="fas fa-cubes"></i> <b>Виды стекла:</b><ul><li>Кварцевое (термостойкое)</li><li>Хрусталь (PbO)</li><li>Цветное (оксиды металлов)</li><li>Лабораторное</li></ul></div>
                    </div>
                `
            },
            { // слайд 4: керамика
                title: 'Керамика',
                raw: `
                    <h2><i class="fas fa-mug-saucer" style="margin-right:10px;"></i>Керамические материалы</h2>
                    <div class="grid-3">
                        <div class="glass-card"><i class="fas fa-trowel"></i> <b>Гончарные изделия</b><br>Каолин + вода → формование → обжиг (900-1200°C)</div>
                        <div class="glass-card"><i class="fas fa-toilet"></i> <b>Санитарная керамика</b><br>Фарфор, фаянс</div>
                        <div class="glass-card"><i class="fas fa-fire"></i> <b>Огнеупоры</b><br>Шамот, магнезит (t>1500°C)</div>
                    </div>
                    <p style="margin-top:20px;">Химизм: при обжиге глина теряет воду, образуется муллит <span class="formula">3Al₂O₃·2SiO₂</span></p>
                `
            },
            { // слайд 5: цемент и бетон
                title: 'Цемент',
                raw: `
                    <h2><i class="fas fa-hard-hat"></i> Цементная промышленность</h2>
                    <div style="display:flex; flex-wrap:wrap; gap:20px;">
                        <div style="flex:2; min-width:250px;">
                            <p><b>Сырьё:</b> известняк + глина (мергель). Обжиг при 1450°C → клинкер.</p>
                            <p><b>Состав клинкера:</b> алит (3CaO·SiO₂), белит (2CaO·SiO₂), алюминатная фаза.</p>
                            <div class="reaction">CaCO₃ → CaO + CO₂  |  CaO + SiO₂ → CaSiO₃</div>
                        </div>
                        <div class="glass-card" style="flex:1;">
                            <span class="stat-number">4.1 млрд т</span><br>мировое производство цемента в год
                        </div>
                    </div>
                `
            },
            { // слайд 6: экология и новые технологии
                title: 'Экология',
                raw: `
                    <h2><i class="fas fa-leaf"></i> Экологические аспекты</h2>
                    <ul>
                        <li>CO₂ выбросы (обжиг известняка — до 8% антропогенных)</li>
                        <li>Пыль, отходы карьеров</li>
                    </ul>
                    <h3 style="margin-top:20px;">Современные разработки</h3>
                    <div class="grid-2">
                        <div class="glass-card"><i class="fas fa-recycle"></i> Переработка стеклобоя (экономия энергии до 30%)</div>
                        <div class="glass-card"><i class="fas fa-solar-panel"></i> Фотоэлектрическое стекло, тонкоплёночные покрытия</div>
                    </div>
                `
            },
            { // слайд 7: итоги и вопросы
                title: 'Значение',
                raw: `
                    <div style="text-align:center;">
                        <i class="fas fa-city" style="font-size:5rem; color:#7cb3ff; margin-bottom:20px;"></i>
                        <h2>Без силикатов нет современной цивилизации</h2>
                        <p style="font-size:1.3rem;">Жилища, дороги, техника, оптоволокно — основаны на силикатной химии.</p>
                        <hr>
                        <p><i class="fas fa-question-circle"></i> Вопросы? Готовы к обсуждению!</p>
                        <div style="display:flex; gap:15px; justify-content:center; margin-top:30px;">
                            <span class="badge">Стекло</span>
                            <span class="badge">Керамика</span>
                            <span class="badge">Цемент</span>
                            <span class="badge">Бетон</span>
                        </div>
                    </div>
                `
            }
        ];

        // текущий индекс
        let currentSlide = 0;
        const slideArea = document.getElementById('slideContent');
        const dotsContainer = document.getElementById('slideDots');
        const counterSpan = document.getElementById('slideCounter');

        // рендер содержимого слайда по индексу
        function renderSlide(index) {
            const slide = slides[index];
            let html = '';

            if (index === 0) {
                // первый слайд особенный (титульный)
                html = `
                    <div style="text-align: center; padding: 40px 0;">
                        <i class="fas ${slide.icon}" style="font-size: 5rem; color: #9ac7ff; margin-bottom: 20px;"></i>
                        <h1>${slide.title}</h1>
                        <p class="subhead" style="font-size: 2rem; margin: 20px 0 10px;">${slide.subtitle}</p>
                        <div style="background: #172b3a; border-radius: 100px; padding: 15px 25px; display: inline-block; margin-top: 30px;">
                            <i class="fas fa-flask"></i> Химия. 9 класс
                        </div>
                        <div style="margin-top: 50px; color: #aac3d9;">
                            <i class="fas fa-arrow-down"></i> Листайте для знакомства с отраслью
                        </div>
                    </div>
                `;
            } else {
                // остальные слайды используют поле raw с готовой вёрсткой
                html = `<div>${slide.raw}</div>`;
            }

            slideArea.innerHTML = html;

            // обновить активную точку
            document.querySelectorAll('.dot').forEach((dot, i) => {
                if (i === index) dot.classList.add('active');
                else dot.classList.remove('active');
            });

            counterSpan.innerText = `${index+1} / ${slides.length}`;
        }

        // создание точек навигации
        function buildDots() {
            dotsContainer.innerHTML = '';
            slides.forEach((_, idx) => {
                const dot = document.createElement('span');
                dot.className = 'dot' + (idx === currentSlide ? ' active' : '');
                dot.addEventListener('click', () => {
                    currentSlide = idx;
                    renderSlide(currentSlide);
                });
                dotsContainer.appendChild(dot);
            });
        }

        // обработчики стрелок
        document.getElementById('prevSlide').addEventListener('click', () => {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            renderSlide(currentSlide);
        });

        document.getElementById('nextSlide').addEventListener('click', () => {
            currentSlide = (currentSlide + 1) % slides.length;
            renderSlide(currentSlide);
        });

        // клавиши влево/вправо
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                document.getElementById('prevSlide').click();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                document.getElementById('nextSlide').click();
            }
        });

        // инициализация
        buildDots();
        renderSlide(0);
    })();
</script>

<!-- дополнительный стиль для небольших правок -->
<style>
    /* чтобы ссылки и иконки выглядели приятно */
    .glass-card ul { margin-top: 10px; }
    .glass-card li { margin: 8px 0; }
    i.fa-solid, i.fa-regular { margin-right: 6px; }
    .slide-area { transition: background 0.2s; }
    .reaction { font-family: 'Courier New', monospace; }
</style>
</body>
</html>
